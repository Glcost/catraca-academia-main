<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="img/logogym.png" type="image/x-icon">
    <title>Gym Sports - Acesso</title>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-smart-yellow { background-color: #FFD700; }
        .text-smart-yellow { color: #FFD700; }
    </style>
</head>
<body class="bg-black h-screen flex flex-col justify-center items-center p-4 md:p-6 lg:p-8">

    <main class="w-full max-w-sm md:max-w-md lg:max-w-lg xl:max-w-xl">
        
        <header class="text-center mb-8 md:mb-10 lg:mb-12">
            <h1 class="text-3xl md:text-4xl lg:text-5xl font-black text-white italic tracking-tighter">
                GYM<span class="text-smart-yellow">SPORTS</span>
            </h1>
            <div class="h-1 md:h-1.5 w-12 md:w-16 bg-smart-yellow mx-auto mt-1 md:mt-2"></div>
        </header>

        <div class="bg-zinc-900 border-b-2 border-smart-yellow p-6 md:p-8 lg:p-10 mb-8 md:mb-10 lg:mb-12">
            <p class="text-zinc-500 text-[10px] md:text-xs lg:text-sm uppercase font-bold mb-2 md:mb-3 tracking-[0.3em] text-center">
                Identificação do Aluno
            </p>
            <div id="visor" class="h-12 md:h-16 lg:h-20 text-white text-4xl md:text-5xl lg:text-6xl font-bold text-center tracking-widest flex items-center justify-center">
                </div>
            <div id="mensagem" class="mt-4 md:mt-6 text-center text-xs md:text-sm font-bold h-4 md:h-5 transition-all uppercase tracking-wider"></div>
        </div>

        <div class="grid grid-cols-3 gap-4 md:gap-5 lg:gap-6">
            <button onclick="digitar('1')" class="h-16 md:h-20 lg:h-24 text-white text-2xl md:text-3xl lg:text-4xl font-light hover:bg-zinc-800 transition-all border border-zinc-800 rounded-lg">1</button>
            <button onclick="digitar('2')" class="h-16 md:h-20 lg:h-24 text-white text-2xl md:text-3xl lg:text-4xl font-light hover:bg-zinc-800 transition-all border border-zinc-800 rounded-lg">2</button>
            <button onclick="digitar('3')" class="h-16 md:h-20 lg:h-24 text-white text-2xl md:text-3xl lg:text-4xl font-light hover:bg-zinc-800 transition-all border border-zinc-800 rounded-lg">3</button>
            
            <button onclick="digitar('4')" class="h-16 md:h-20 lg:h-24 text-white text-2xl md:text-3xl lg:text-4xl font-light hover:bg-zinc-800 transition-all border border-zinc-800 rounded-lg">4</button>
            <button onclick="digitar('5')" class="h-16 md:h-20 lg:h-24 text-white text-2xl md:text-3xl lg:text-4xl font-light hover:bg-zinc-800 transition-all border border-zinc-800 rounded-lg">5</button>
            <button onclick="digitar('6')" class="h-16 md:h-20 lg:h-24 text-white text-2xl md:text-3xl lg:text-4xl font-light hover:bg-zinc-800 transition-all border border-zinc-800 rounded-lg">6</button>
            
            <button onclick="digitar('7')" class="h-16 md:h-20 lg:h-24 text-white text-2xl md:text-3xl lg:text-4xl font-light hover:bg-zinc-800 transition-all border border-zinc-800 rounded-lg">7</button>
            <button onclick="digitar('8')" class="h-16 md:h-20 lg:h-24 text-white text-2xl md:text-3xl lg:text-4xl font-light hover:bg-zinc-800 transition-all border border-zinc-800 rounded-lg">8</button>
            <button onclick="digitar('9')" class="h-16 md:h-20 lg:h-24 text-white text-2xl md:text-3xl lg:text-4xl font-light hover:bg-zinc-800 transition-all border border-zinc-800 rounded-lg">9</button>
            
            <button onclick="limpar()" class="h-16 md:h-20 lg:h-24 text-zinc-500 hover:text-white transition-all flex justify-center items-center">
                <i class="fas fa-times text-xl md:text-2xl lg:text-3xl"></i>
            </button>
            
            <button onclick="digitar('0')" class="h-16 md:h-20 lg:h-24 text-white text-2xl md:text-3xl lg:text-4xl font-light hover:bg-zinc-800 transition-all border border-zinc-800 rounded-lg">0</button>
            
            <button onclick="verificarAcesso()" class="h-16 md:h-20 lg:h-24 bg-smart-yellow text-black flex justify-center items-center hover:brightness-110 active:scale-95 transition-all">
                <i class="fas fa-arrow-right text-xl md:text-2xl lg:text-3xl"></i>
            </button>
        </div>

    </main>

    <script src="catraca.js"></script>
</body>
</html>
