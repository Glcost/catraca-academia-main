<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="img/logogym.png" type="image/x-icon">
    <title>Gym Sports - Acesso</title>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-smart-yellow { background-color: #FFD700; }
        .text-smart-yellow { color: #FFD700; }
    </style>
</head>
<body class="bg-black h-screen flex flex-col justify-center items-center p-4">

    <main class="w-full max-w-sm">
        
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black text-white italic tracking-tighter">
                GYM<span class="text-smart-yellow">SPORTS</span>
            </h1>
            <div class="h-1 w-12 bg-smart-yellow mx-auto mt-1"></div>
        </header>

        <div class="bg-zinc-900 border-b-2 border-smart-yellow p-6 mb-8">
            <p class="text-zinc-500 text-[10px] uppercase font-bold mb-2 tracking-[0.3em] text-center">Identificação do Aluno</p>
            <div id="visor" class="h-12 text-white text-4xl font-bold text-center tracking-widest flex items-center justify-center">
                </div>
            <div id="mensagem" class="mt-4 text-center text-xs font-bold h-4 transition-all uppercase tracking-wider"></div>
        </div>

        <div class="grid grid-cols-3 gap-4">
            <button onclick="digitar('1')" class="h-16 text-white text-2xl font-light hover:bg-zinc-800 transition-all border border-zinc-800 rounded-lg">1</button>
            <button onclick="digitar('2')" class="h-16 text-white text-2xl font-light hover:bg-zinc-800 transition-all border border-zinc-800 rounded-lg">2</button>
            <button onclick="digitar('3')" class="h-16 text-white text-2xl font-light hover:bg-zinc-800 transition-all border border-zinc-800 rounded-lg">3</button>
            
            <button onclick="digitar('4')" class="h-16 text-white text-2xl font-light hover:bg-zinc-800 transition-all border border-zinc-800 rounded-lg">4</button>
            <button onclick="digitar('5')" class="h-16 text-white text-2xl font-light hover:bg-zinc-800 transition-all border border-zinc-800 rounded-lg">5</button>
            <button onclick="digitar('6')" class="h-16 text-white text-2xl font-light hover:bg-zinc-800 transition-all border border-zinc-800 rounded-lg">6</button>
            
            <button onclick="digitar('7')" class="h-16 text-white text-2xl font-light hover:bg-zinc-800 transition-all border border-zinc-800 rounded-lg">7</button>
            <button onclick="digitar('8')" class="h-16 text-white text-2xl font-light hover:bg-zinc-800 transition-all border border-zinc-800 rounded-lg">8</button>
            <button onclick="digitar('9')" class="h-16 text-white text-2xl font-light hover:bg-zinc-800 transition-all border border-zinc-800 rounded-lg">9</button>
            
            <button onclick="limpar()" class="h-16 text-zinc-500 hover:text-white transition-all flex justify-center items-center">
                <i class="fas fa-times text-xl"></i>
            </button>
            
            <button onclick="digitar('0')" class="h-16 text-white text-2xl font-light hover:bg-zinc-800 transition-all border border-zinc-800 rounded-x">0</button>
            
            <button onclick="verificarAcesso()" class="h-16 bg-smart-yellow text-black flex justify-center items-center hover:brightness-110 active:scale-95 transition-all">
                <i class="fas fa-arrow-right text-xl"></i>
            </button>
        </div>

    </main>

    <script src="catraca.js"></script>
</body>
</html>
